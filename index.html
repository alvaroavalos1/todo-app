<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do PRO</title>
    <link rel="manifest" href="manifest.json">

    <!-- ==========================================
         ZONA DE DISEÑO (CSS) 
         Aquí puedes cambiar colores, tamaños y bordes
         ========================================== -->
    <style>
        /* 1. Fondo y Cuerpo */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Color del fondo */
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding-top: 50px; 
        }

        /* 2. El contenedor principal (la tarjeta blanca) */
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            width: 350px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            height: fit-content;
        }

        /* 3. Títulos */
        h2 { color: #333; margin-top: 0; font-size: 24px; }
        #userInfo { color: #666; font-size: 14px; margin-bottom: 20px; }

        /* 4. Inputs (Donde escribes la tarea) */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        
        input { 
            flex-grow: 1; 
            padding: 12px; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            outline: none; 
            transition: 0.3s;
        }
        input:focus { border-color: #667eea; }

        /* 5. Botones */
        button { 
            padding: 12px; 
            cursor: pointer; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            transition: 0.3s; 
        }

        .btn-add { background: #2ed573; color: white; width: 50px; }
        .btn-add:hover { background: #26af5f; transform: scale(1.05); }

        .btn-login { 
            width: 100%; 
            background: #4285F4; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
        }

        .btn-logout { 
            background: transparent; 
            color: #ff4757; 
            width: 100%; 
            margin-top: 20px; 
            font-size: 13px;
        }

        /* 6. Lista de Tareas */
        ul { padding: 0; margin: 0; }
        
        li { 
            list-style: none; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #fdfdfd; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #667eea; /* Línea de color a la izquierda */
            animation: slideIn 0.3s ease;
        }

        .btn-delete { background: none; color: #ff4757; font-size: 18px; padding: 0; }

        /* Animación cuando aparece una tarea */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- ==========================================
         ESTRUCTURA VISUAL (HTML)
         ========================================== -->
    <div class="card">
        <h2>To-Do PRO 🔥</h2>

        <!-- Pantalla: Antes de entrar -->
        <div id="loginScreen">
            <p>Bienvenido. Por favor, inicia sesión para continuar.</p>
            <button class="btn-login" onclick="login()">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20" alt="google">
                Iniciar con Google
            </button>
        </div>

        <!-- Pantalla: Dentro de la App -->
        <div id="app" style="display:none;">
            <p id="userInfo"></p>
            
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Añadir una tarea...">
                <button class="btn-add" onclick="addTask()">➕</button>
            </div>

            <!-- Aquí se inyectan las tareas automáticamente -->
            <ul id="taskList"></ul>

            <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
        </div>
    </div>


    <!-- ==========================================
         LÓGICA DE PROGRAMACIÓN (JavaScript)
         No tocar a menos que quieras cambiar la base de datos
         ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc, enableIndexedDbPersistence, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCmDh0zSKxMvWlmPKczgKwcniWvY1GwlFU",
            authDomain: "todo-realtime-26f64.firebaseapp.com",
            projectId: "todo-realtime-26f64",
            storageBucket: "todo-realtime-26f64.appspot.com",
            messagingSenderId: "343368634824",
            appId: "1:343368634824:web:7c27761218bbe2887b30fd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Activar modo offline
        enableIndexedDbPersistence(db).catch(() => console.warn("Modo offline activado solo en una pestaña"));
        setPersistence(auth, browserLocalPersistence);

        let unsubscribe = null;

        // Funciones de Usuario
        window.login = async () => {
            try { await signInWithPopup(auth, new GoogleAuthProvider()); } 
            catch (e) { console.error(e); }
        };
        window.logout = () => signOut(auth);

        // Detectar Usuario
        onAuthStateChanged(auth, (user) => {
            if (unsubscribe) unsubscribe();
            if (user) {
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("app").style.display = "block";
                document.getElementById("userInfo").textContent = "👤 " + user.displayName;
                loadTasks(user.uid);
            } else {
                document.getElementById("loginScreen").style.display = "block";
                document.getElementById("app").style.display = "none";
            }
        });

        // Funciones de Tareas
        window.addTask = async () => {
            const input = document.getElementById("taskInput");
            if (!input.value.trim()) return;
            await addDoc(collection(db, "tasks"), {
                text: input.value,
                userId: auth.currentUser.uid,
                createdAt: serverTimestamp()
            });
            input.value = "";
        };

        window.deleteTask = async (id) => {
            await deleteDoc(doc(db, "tasks", id));
        };

        function loadTasks(uid) {
            const q = query(collection(db, "tasks"), where("userId", "==", uid));
            unsubscribe = onSnapshot(q, (snapshot) => {
                const list = document.getElementById("taskList");
                list.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const li = document.createElement("li");
                    li.innerHTML = `
                        <span>${data.text}</span>
                        <button class="btn-delete" onclick="deleteTask('${docSnap.id}')">❌</button>
                    `;
                    list.appendChild(li);
                });
            });
        }

        // Enter para agregar
        document.getElementById("taskInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") addTask();
        });
    </script>

    <script>
        // Service Worker para carga offline
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js");
        }
    </script>
</body>
</html>
