<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do PRO</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; justify-content: center; min-height: 100vh; margin: 0; padding-top: 50px; }
        .box { background: white; padding: 25px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        input { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; }
        .login-btn { width: 100%; background: #4285F4; color: white; font-weight: bold; }
        .logout { background: #ff4757; color: white; width: 100%; margin-top: 20px; }
        ul { padding: 0; margin-top: 20px; }
        li { list-style: none; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 5px solid #667eea; }
        .del-btn { background: none; color: #ff4757; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="box">
    <h2>To-Do PRO 🔥</h2>

    <div id="loginScreen">
        <button class="login-btn" onclick="login()">🔐 Iniciar con Google</button>
    </div>

    <div id="app" style="display:none;">
        <p id="userInfo"></p>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="taskInput" placeholder="Nueva tarea...">
            <button onclick="addTask()" style="background: #2ed573; color: white;">➕</button>
        </div>
        <ul id="taskList"></ul>
        <button class="logout" onclick="logout()">Cerrar sesión</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCmDh0zSKxMvWlmPKczgKwcniWvY1GwlFU",
        authDomain: "todo-realtime-26f64.firebaseapp.com",
        projectId: "todo-realtime-26f64",
        storageBucket: "todo-realtime-26f64.appspot.com",
        messagingSenderId: "343368634824",
        appId: "1:343368634824:web:7c27761218bbe2887b30fd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // PERSISTENCIA LOCAL (Para que no se cierre la sesión al cerrar pestaña)
    setPersistence(auth, browserLocalPersistence);

    let unsubscribe = null;

    // LOGIN CON POPUP (Más confiable que Redirect)
    window.login = async () => {
        const provider = new GoogleAuthProvider();
        try {
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error("Error en login:", error);
            alert("Error al iniciar sesión");
        }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (unsubscribe) unsubscribe();

        if (user) {
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("app").style.display = "block";
            document.getElementById("userInfo").textContent = "Hola, " + user.displayName;
            loadTasks(user.uid);
        } else {
            document.getElementById("loginScreen").style.display = "block";
            document.getElementById("app").style.display = "none";
            document.getElementById("taskList").innerHTML = "";
        }
    });

    window.addTask = async () => {
        const input = document.getElementById("taskInput");
        const text = input.value.trim();
        if (!text || !auth.currentUser) return;

        try {
            await addDoc(collection(db, "tasks"), {
                text,
                userId: auth.currentUser.uid,
                createdAt: Date.now()
            });
            input.value = "";
        } catch (e) {
            console.error("Error añadiendo:", e);
        }
    };

    function loadTasks(uid) {
        const q = query(collection(db, "tasks"), where("userId", "==", uid));
        
        unsubscribe = onSnapshot(q, (snapshot) => {
            const list = document.getElementById("taskList");
            list.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const li = document.createElement("li");
                li.innerHTML = `
                    <span>${data.text}</span>
                    <button class="del-btn" onclick="deleteTask('${docSnap.id}')">❌</button>
                `;
                list.appendChild(li);
            });
        });
    }

    window.deleteTask = async (id) => {
        await deleteDoc(doc(db, "tasks", id));
    };

    document.getElementById("taskInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") addTask();
    });
</script>

<script>
    // Registro del SW corregido para evitar errores si no existe
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(err => console.log("SW no registrado (es normal si no tienes el archivo sw.js aún)"));
    }
</script>

</body>
</html>
